header:
  version: 8
  includes:
    - kas-qbee-agent.yml.template

target:
  - core-image-minimal

env:
  # Tell Kas to execute the OEQA test framework instead of a standard build
  KAS_TASK: "testimage"

local_conf_header:
  testing: |
    IMAGE_INSTALL:append = " qbee-agent"    
    INHERIT += "testimage"
    TEST_SUITES:append = " qbee"
    EXTRA_IMAGE_FEATURES += "ssh-server-dropbear allow-empty-password empty-root-password allow-root-login"