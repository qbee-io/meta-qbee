header:
  version: 8
  includes:
    - kas-qbee-agent.yml

target:
  - core-image-minimal

task: testimage

local_conf_header:
  testing: |
    IMAGE_INSTALL:append = " qbee-agent dropbear"    
    IMAGE_CLASSES += "testimage"
    TEST_SUITES = "ping ssh qbee"
    IMAGE_FEATURES += "allow-empty-password empty-root-password allow-root-login"
    # Legacy Kirkstone qemu toggles
    QEMU_USE_SLIRP = "1"
    QEMU_USE_KVM = "0"
    # modern LTS qemu toggles
    TEST_RUNQEMUPARAMS += " slirp"
    TEST_SERIALCONTROL_STATUS = "0"