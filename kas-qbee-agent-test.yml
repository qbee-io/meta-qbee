header:
  version: 8
  includes:
    - kas-qbee-agent.yml

target:
  - core-image-minimal

task: testimage

local_conf_header:
  testing: |
    IMAGE_INSTALL:append = " qbee-agent"    
    IMAGE_CLASSES += "testimage"
    TEST_SUITES = "ping ssh qbee"
    EXTRA_IMAGE_FEATURES += "ssh-server-dropbear allow-empty-password empty-root-password allow-root-login"
    # Legacy Kirkstone qemu toggles
    QEMU_USE_SLIRP = "1"
    QEMU_USE_KVM = "0"
    # modern LTS qemu toggles
    TEST_RUNQEMUPARAMS += " slirp"
    # Tell the test framework to wait a bit longer for the boot sequence,
    # and skip the serial console login check, relying entirely on SSH.
    TEST_SERIALCONTROL_EXTRA_ARGS = "-q"