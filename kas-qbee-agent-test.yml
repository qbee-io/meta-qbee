header:
  version: 8
  includes:
    - kas-qbee-agent.yml

target:
  - core-image-minimal

task: testimage

local_conf_header:
  testing: |
    IMAGE_INSTALL:append = " qbee-agent"    
    IMAGE_CLASSES += "testimage"
    TEST_SUITES:append = " qbee"
    EXTRA_IMAGE_FEATURES += "ssh-server-dropbear allow-empty-password empty-root-password allow-root-login"

    # Legacy SLIRP toggle for Kirkstone (4.0) and older
    QEMU_USE_SLIRP = "1"
    
    # Modern SLIRP toggle for Scarthgap (5.0), Wrynose (6.0), and Master
    TEST_RUNQEMUPARAMS += " slirp"